<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@700&amp;display=swap');
    </style>
    <!-- OpenAPI 绿色渐变 (上亮下暗) -->
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#85EA2D"/>
      <stop offset="50%" style="stop-color:#6BA539"/>
      <stop offset="100%" style="stop-color:#4A7C23"/>
    </linearGradient>
    <!-- 蓝色渐变 (上亮下暗) -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4A7DC4"/>
      <stop offset="50%" style="stop-color:#2B5797"/>
      <stop offset="100%" style="stop-color:#1E3A5F"/>
    </linearGradient>
  </defs>
  
  <!-- 左半边绿色 (带圆角) -->
  <path d="M23 14 L60 14 L60 106 L23 106 Q15 106 15 98 L15 22 Q15 14 23 14 Z" fill="url(#greenGrad)"/>
  
  <!-- 右半边蓝色 (带圆角和折角) -->
  <path d="M60 14 L85 14 L105 34 L105 98 Q105 106 97 106 L60 106 Z" fill="url(#blueGrad)"/>
  
  <!-- 折角 -->
  <path d="M85 14 L105 34 L85 34 Z" fill="#1E3A5F"/>
  
  <!-- 左边的 { 符号 -->
  <text x="37" y="70" text-anchor="middle" font-family="'Fira Code', monospace" font-size="38" font-weight="700" fill="white">{</text>
  
  <!-- 右边的 W 字母 -->
  <text x="80" y="70" text-anchor="middle" font-family="'Fira Code', monospace" font-size="32" font-weight="700" fill="white">W</text>
</svg>