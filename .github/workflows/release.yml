name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target universal-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: '--bundles nsis'

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf pkg-config libsoup-3.0-dev javascriptcoregtk-4.1 libjavascriptcoregtk-4.1-dev xdg-utils

      - name: Rust setup
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Node.js setup
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install && pnpm approve-builds

      - name: Build the app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build ${{ matrix.args }}

      - name: Collect release artifacts
        shell: bash
        run: |
          mkdir -p release-assets
          find src-tauri/target -type f \( \
            -name "*.dmg" -o \
            -name "*.app.tar.gz" -o -name "*.app.tar.gz.sig" -o \
            -name "*.exe" -o -name "*.exe.sig" -o \
            -name "*.deb" -o \
            -name "*.AppImage" -o -name "*.AppImage.sig" \
          \) -exec cp {} release-assets/ \;
          echo "Collected artifacts:"
          ls -la release-assets/

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-${{ matrix.platform }}-${{ strategy.job-index }}
          path: release-assets/*
          if-no-files-found: warn

      - name: List generated bundles (debug)
        if: always()
        shell: bash
        run: |
          find src-tauri/target -maxdepth 6 -type f \( -name "*.sig" -o -name "*.exe" -o -name "*.msi" -o -name "*.dmg" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.tar.gz" \) 2>/dev/null || true

  publish-release:
    needs: build-tauri
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
          pattern: 'release-assets-*'
          merge-multiple: true

      - name: List downloaded artifacts
        run: find all-artifacts -type f | head -50

      - name: Checkout for CHANGELOG
        uses: actions/checkout@v4
        with:
          sparse-checkout: CHANGELOG.md
          sparse-checkout-cone-mode: false

      - name: Extract release notes from CHANGELOG
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Extract content between "## vX.Y.Z" and the next "## v"
          awk -v tag="$TAG" '
            BEGIN { found=0 }
            $0 ~ "^## " tag { found=1; next }
            found && /^## v/ { exit }
            found { print }
          ' CHANGELOG.md | sed '/^$/N;/^\n$/d' > release_notes.txt
          if [ ! -s release_notes.txt ]; then
            echo "Release $TAG" > release_notes.txt
          fi
          echo "Release notes:"
          cat release_notes.txt

      - name: Build latest.json from signatures
        env:
          VERSION: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          DOWNLOAD_BASE="https://github.com/${REPO}/releases/download/${VERSION}"
          VER="${VERSION#v}"
          NOTES=$(cat release_notes.txt 2>/dev/null || echo "See release page for details")

          read_sig() {
            local pattern="$1"
            local sig_file
            sig_file=$(find all-artifacts -name "$pattern" -type f 2>/dev/null | head -1)
            if [ -n "$sig_file" ] && [ -f "$sig_file" ]; then
              cat "$sig_file"
            else
              echo ""
            fi
          }

          # Find asset filenames
          NSIS_EXE=$(find all-artifacts -name "*.exe" -not -name "*.sig" -type f 2>/dev/null | head -1)
          NSIS_NAME=$([ -n "$NSIS_EXE" ] && basename "$NSIS_EXE" || echo "")
          MAC_TAR=$(find all-artifacts -name "*.app.tar.gz" -not -name "*.sig" -type f 2>/dev/null | head -1)
          MAC_NAME=$([ -n "$MAC_TAR" ] && basename "$MAC_TAR" || echo "")
          APPIMAGE=$(find all-artifacts -name "*.AppImage" -not -name "*.sig" -type f 2>/dev/null | head -1)
          APPIMAGE_NAME=$([ -n "$APPIMAGE" ] && basename "$APPIMAGE" || echo "")

          # Read signatures
          NSIS_SIG=$(read_sig "*.exe.sig")
          MAC_SIG=$(read_sig "*.app.tar.gz.sig")
          APPIMAGE_SIG=$(read_sig "*.AppImage.sig")

          echo "Signatures found:"
          [ -n "$MAC_SIG" ] && echo "  macOS: YES ($MAC_NAME)" || echo "  macOS: NO"
          [ -n "$NSIS_SIG" ] && echo "  Windows NSIS: YES ($NSIS_NAME)" || echo "  Windows NSIS: NO"
          [ -n "$APPIMAGE_SIG" ] && echo "  Linux AppImage: YES ($APPIMAGE_NAME)" || echo "  Linux AppImage: NO"

          # URL-encode filenames (spaces -> %20)
          url_encode() { echo "$1" | sed 's/ /%20/g'; }

          jq -n \
            --arg version "$VER" \
            --arg notes "$NOTES" \
            --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg dl "$DOWNLOAD_BASE" \
            --arg mac_name "$(url_encode "$MAC_NAME")" \
            --arg mac_sig "$MAC_SIG" \
            --arg win_name "$(url_encode "$NSIS_NAME")" \
            --arg win_sig "$NSIS_SIG" \
            --arg linux_name "$(url_encode "$APPIMAGE_NAME")" \
            --arg linux_sig "$APPIMAGE_SIG" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: (
                {}
                + (if $mac_sig != "" then {
                    "darwin-aarch64": { url: "\($dl)/\($mac_name)", signature: $mac_sig },
                    "darwin-x86_64": { url: "\($dl)/\($mac_name)", signature: $mac_sig }
                  } else {} end)
                + (if $win_sig != "" then {
                    "windows-x86_64": { url: "\($dl)/\($win_name)", signature: $win_sig }
                  } else {} end)
                + (if $linux_sig != "" then {
                    "linux-x86_64": { url: "\($dl)/\($linux_name)", signature: $linux_sig }
                  } else {} end)
              )
            }' > latest.json

          echo "Generated latest.json:"
          cat latest.json

      - name: Create or update GitHub Release
        uses: ncipollo/release-action@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          allowUpdates: true
          name: 'Spec2Doc ${{ github.ref_name }}'
          bodyFile: 'release_notes.txt'
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: 'all-artifacts/**/*,latest.json'
          artifactErrorsFailBuild: false
          replacesArtifacts: true
          makeLatest: legacy
